        <h1>Wellness</h1>
        <p class="tagline">Beyond medication, whole-person care</p>
        <p class="subtitle">Psychiatric treatment extends beyond prescriptions. Azimuth integrates evidence-based supportive services into your care — movement, mindfulness, and bodywork as therapeutic complements.</p>
    </section>

    <!-- SUPPORTIVE SERVICES -->
    <section class="section" id="main-content" style="background: var(--light-gray);">
        <div class="container">
            <h2 class="section-title fade-in">Supportive Services</h2>
            <div class="divider"></div>
            <p style="text-align: center; max-width: 700px; margin: -1rem auto 2.5rem; color: var(--dark-gray); font-size: 0.95rem;">
                Movement, mindfulness, and bodywork as therapeutic complements — not replacements — to psychiatric care.
            </p>

            <div class="wellness-grid">
                <div class="wellness-card fade-in">
                    <div class="icon">🧘</div>
                    <h3>Yoga Instruction</h3>
                    <div class="provider-note">In-House &amp; Outside Providers</div>
                    <p>As a 200-hour trained yoga teacher, AJ integrates yoga instruction, breathwork, and somatic awareness directly into treatment. Yoga supports nervous system regulation, emotional processing, and embodied mindfulness — offering a bridge between the clinical session and daily life. Additional instruction available through partnered yoga studios.</p>
                </div>
                <div class="wellness-card fade-in">
                    <div class="icon">📍</div>
                    <h3>Acupuncture</h3>
                    <div class="provider-note">Professional Agreements with Outside Providers</div>
                    <p>Acupuncture has demonstrated efficacy for anxiety, insomnia, chronic pain, and stress-related conditions. Azimuth maintains professional agreements with licensed acupuncturists who understand the intersection of traditional Chinese medicine and psychiatric care, ensuring coordinated treatment aligned with your goals.</p>
                </div>
                <div class="wellness-card fade-in">
                    <div class="icon">🤲</div>
                    <h3>Bodywork &amp; Massage</h3>
                    <div class="provider-note">Professional Agreements with Outside Providers</div>
                    <p>Trauma and chronic stress live in the body. Therapeutic bodywork — including massage, myofascial release, and craniosacral therapy — helps release physical tension patterns associated with anxiety, PTSD, and chronic pain. Coordinated through professional agreements with licensed bodywork practitioners.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- EXPERIENTIAL THERAPY -->
    <section class="experiential-section">
        <div class="container">
            <h2 class="section-title fade-in" style="color: var(--gold);">Experiential Therapy</h2>
            <div class="divider"></div>
            <p class="experiential-intro fade-in">Healing doesn't only happen in an office. The outdoors offers a powerful therapeutic environment — reducing cortisol, improving mood, and building resilience through direct experience. Azimuth integrates curated outdoor activities into treatment plans as a complement to traditional psychiatric care.</p>

            <div class="experiential-grid">
                <div class="experiential-card fade-in">
                    <h4>Nature-Based Regulation</h4>
                    <p>Trail running, hiking, and gravel cycling engage the body's natural stress response systems. Movement in nature activates parasympathetic pathways that medication alone cannot reach — building lasting capacity for emotional regulation.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Challenge &amp; Mastery</h4>
                    <p>Ice climbing, skiing, and paddling demand present-moment awareness and progressive skill building. These experiences create concrete evidence of competence that directly counters the cognitive distortions of depression and anxiety.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Social Connection</h4>
                    <p>Shared outdoor experiences — group rides, fly fishing, camping — build authentic social bonds outside clinical settings. Connection forged through shared challenge is qualitatively different from what a therapy group can offer.</p>
                </div>
            </div>
        </div>
    </section>


