    <section class="page-hero" id="main-content">
        <h1>Clinical Insights</h1>
        <p class="lead">Evidence-based perspectives on psychiatry, integrated wellness, and the intersection of mental and metabolic health.</p>
    </section>

    <!-- ABOUT THIS SPACE -->
    <section style="padding: 3.5rem 2rem 0; background: var(--light-gray);">
        <div class="container">
            <div class="about-blog-card fade-in" style="display: grid; grid-template-columns: 200px 1fr; gap: 2rem; align-items: center; max-width: 850px; margin: 0 auto; background: var(--white); padding: 2rem; border-radius: 3px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);">
