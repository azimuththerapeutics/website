                    <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--navy); margin-bottom: 0.5rem; letter-spacing: 1px;">About This Space</h3>
                    <p style="font-size: 0.95rem; color: var(--dark-gray); line-height: 1.8; margin-bottom: 0.75rem;">This is a space for sharing thoughts grounded in unbiased clinical research and analysis. Every article provides its evidence sources. When contradictory evidence exists, it gets published alongside the original analysis — because intellectual honesty matters more than being right.</p>
                    <p style="font-size: 0.95rem; color: var(--dark-gray); line-height: 1.8;">The goal is straightforward: help people make more informed decisions about their mental health based on what the evidence actually shows — not what's being marketed to them.</p>
                    <p style="font-size: 0.85rem; color: var(--gold); margin-top: 1rem; font-weight: 600;">— AJ Anderson, APRN, PMHNP-BC, LCSW</p>
                </div>
            </div>
        </div>
    </section>

