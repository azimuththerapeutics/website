/* ===== AZIMUTH THERAPEUTICS - SHARED STYLESHEET ===== */
/* Concierge psychiatry practice website - Navy/Gold luxury aesthetic */
/* Last updated: March 2026 */

/* ===== CSS RESET & VARIABLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --navy: #1B3A5C;
    --navy-deep: #0F2642;
    --gold: #C9A96E;
    --gold-dark: #9A7D4E;
    --gold-light: rgba(201, 169, 110, 0.08);
    --white: #FFFFFF;
    --light-gray: #F8F6F3;
    --dark-gray: #4A4A4A;
    --text: #2C2C2C;
    --sage: #5A9A78;
    --warm: #C0784A;
    --hairline: rgba(201, 169, 110, 0.2);
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Lato', sans-serif;
    color: var(--text);
    line-height: 1.65;
    overflow-x: hidden;
    font-size: 15px;
    letter-spacing: 0.01em;
}

h1, h2, h3, h4, h5, h6 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0.02em;
}

/* ===== LAYOUT ESSENTIALS ===== */
html, body {
    overflow-x: hidden;
}

img, video, svg, iframe {
    max-width: 100%;
    height: auto;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
}

/* ===== NAVIGATION ===== */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
    background-color: rgba(27, 58, 92, 0.95);
    backdrop-filter: blur(12px);
    padding: 1.1rem 2rem;
    transition: all 0.4s ease;
    box-shadow: none;
    border-bottom: 1px solid rgba(201, 169, 110, 0.08);
}

nav.scrolled {
    padding: 0.75rem 2rem;
    box-shadow: 0 1px 12px rgba(0, 0, 0, 0.1);
    background-color: rgba(27, 58, 92, 0.98);
}

nav .container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-family: 'Cinzel', 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 5px;
    margin-right: 2rem;
    flex-shrink: 0;
}

.logo a {
    color: inherit;
    text-decoration: none;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 1.25rem;
    align-items: center;
}

nav a {
    color: var(--white);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color 0.3s ease;
    position: relative;
}

nav a:hover {
    color: var(--gold);
}

nav a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 0;
    height: 2px;
    background-color: var(--gold);
    transition: width 0.3s ease;
}

nav a:hover::after {
    width: 100%;
}

/* Navigation Dropdowns */
.nav-dropdown {
    position: relative;
}

.dropdown-arrow {
    font-size: 0.7rem;
    transition: transform 0.3s ease;
}

nav ul.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(27, 58, 92, 0.98);
    backdrop-filter: blur(10px);
    min-width: 200px;
    padding: 0.75rem 0;
    border-radius: 3px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    opacity: 0;
    visibility: hidden;
    transition: all 0.25s ease;
    list-style: none;
    margin-top: 0.5rem;
    border: 1px solid rgba(201, 169, 110, 0.15);
    flex-direction: column;
    gap: 0;
    z-index: 1001;
}

.nav-dropdown:hover .dropdown-menu,
.nav-dropdown:focus-within .dropdown-menu {
    opacity: 1;
    visibility: visible;
}

.nav-dropdown:hover .dropdown-arrow {
    transform: rotate(180deg);
}

.dropdown-menu li {
    padding: 0;
}

.dropdown-menu li a {
    display: block;
    padding: 0.6rem 1.5rem;
    font-size: 0.95rem;
    white-space: nowrap;
    transition: background 0.2s ease, color 0.2s ease;
}

.dropdown-menu li a:hover {
    background: rgba(201, 169, 110, 0.1);
}

.dropdown-menu li a::after {
    display: none;
}

/* Hamburger Menu */
.hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    flex-direction: column;
    gap: 5px;
    z-index: 1001;
}

.hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gold);
    transition: all 0.3s ease;
}

.hamburger.active span:nth-child(1) {
    transform: rotate(45deg) translate(8px, 8px);
}

.hamburger.active span:nth-child(2) {
    opacity: 0;
}

.hamburger.active span:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
}

/* Mobile Navigation Overlay */
.nav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 998;
}

.nav-overlay.active {
    opacity: 1;
    visibility: visible;
}

/* ===== HERO SECTIONS ===== */
.hero {
    background: linear-gradient(170deg, #1B3A5C 0%, #15304E 40%, #0F2642 100%);
    color: var(--white);
    text-align: center;
    padding: 7rem 2rem 3.5rem;
    position: relative;
    min-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    background: linear-gradient(transparent, var(--light-gray));
}

.hero h1 {
    font-size: 2.6rem;
    letter-spacing: 8px;
    margin-bottom: 1.2rem;
    font-weight: 400;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
}

.hero .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 1.2rem;
    position: relative;
    z-index: 2;
    letter-spacing: 0.5px;
}

.hero .subtitle {
    font-size: 0.92rem;
    opacity: 0.75;
    max-width: 600px;
    margin: 0 auto 2rem;
    position: relative;
    z-index: 2;
    letter-spacing: 0.3px;
    line-height: 1.7;
}

/* Subpage Hero (shorter than homepage) */
.page-hero {
    background: linear-gradient(170deg, #1B3A5C 0%, #15304E 40%, #0F2642 100%);
    color: var(--white);
    text-align: center;
    padding: 6rem 2rem 3rem;
    position: relative;
    margin-top: 50px;
}

.page-hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: linear-gradient(transparent, var(--light-gray));
}

.page-hero h1 {
    font-size: 2rem;
    letter-spacing: 6px;
    margin-bottom: 0.75rem;
    font-weight: 400;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
}

.page-hero .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--gold);
    position: relative;
    z-index: 2;
    letter-spacing: 0.5px;
}

.page-hero .lead {
    font-size: 0.92rem;
    opacity: 0.75;
    max-width: 550px;
    margin: 0.5rem auto 0;
    line-height: 1.7;
}

/* ===== SECTIONS ===== */
.section {
    padding: 4.5rem 2rem;
}

.section-title {
    font-size: 1.8rem;
    text-align: center;
    margin-bottom: 0.4rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--navy);
    font-weight: 400;
}

.section-subtitle {
    font-size: 0.92rem;
    text-align: center;
    color: var(--dark-gray);
    margin-bottom: 1.5rem;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    letter-spacing: 0.2px;
}

.divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0.5rem auto 2rem;
    opacity: 0.5;
}

/* ===== WELLNESS SERVICES ===== */
.wellness-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.wellness-card {
    background: var(--white);
    border-radius: 4px;
    padding: 2rem 1.75rem;
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.04);
    border-top: 2px solid var(--hairline);
    transition: transform 0.3s, box-shadow 0.3s;
}

.wellness-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
    border-top-color: var(--gold);
}

.wellness-card .icon {
    font-size: 1.3rem;
    margin-bottom: 0.6rem;
    opacity: 0.7;
}

.wellness-card h3 {
    font-size: 1.15rem;
    color: var(--navy);
    margin-bottom: 0.5rem;
    letter-spacing: 0.5px;
}

.wellness-card .provider-note {
    font-size: 0.8rem;
    color: var(--gold-dark);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
}

.wellness-card p {
    font-size: 0.87rem;
    color: var(--dark-gray);
    line-height: 1.65;
}

/* ===== EXPERIENTIAL SECTIONS ===== */
.experiential-section {
    background: linear-gradient(170deg, #1B3A5C 0%, #0F2642 100%);
    color: var(--white);
    padding: 4rem 0;
}

.experiential-section.light {
    background: var(--light-gray);
    color: var(--text);
}

.experiential-intro {
    text-align: center;
    max-width: 750px;
    margin: 0 auto 2.5rem;
    font-size: 1rem;
    opacity: 0.85;
    line-height: 1.7;
}

.experiential-section.light .experiential-intro {
    opacity: 1;
    color: var(--text);
}

.experiential-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
}

.experiential-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 3px;
    padding: 1.75rem;
    transition: background 0.3s;
}

.experiential-section.light .experiential-card {
    background: var(--white);
    border: 1px solid rgba(0, 0, 0, 0.05);
}

.experiential-card:hover {
    background: rgba(255, 255, 255, 0.1);
}

.experiential-section.light .experiential-card:hover {
    background: rgba(201, 169, 110, 0.05);
}

.experiential-card h4 {
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 0.6rem;
    letter-spacing: 0.5px;
}

.experiential-section.light .experiential-card h4 {
    color: var(--navy);
}

.experiential-card p {
    font-size: 0.85rem;
    opacity: 0.75;
    line-height: 1.65;
}

.experiential-section.light .experiential-card p {
    opacity: 1;
    color: var(--text);
}

/* ===== SUPPLEMENTS SECTION ===== */
.supplements-section {
    background: var(--light-gray);
    padding: 4rem 0;
}

.supplement-categories {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.supplement-categories.auto-fit {
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.supplement-category {
    background: var(--white);
    border-radius: 3px;
    padding: 1.75rem;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.04);
}

.supplement-category h4 {
    font-size: 1.1rem;
    color: var(--navy);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: 0.5px;
}

.supplement-item {
    margin-bottom: 1.2rem;
}

.supplement-item:last-child {
    margin-bottom: 0;
}

.supplement-item h5 {
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.2rem;
}

.supplement-item p {
    font-size: 0.88rem;
    color: var(--dark-gray);
    line-height: 1.5;
}

/* ===== BUTTONS & CTA ===== */
.btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 2px;
    text-decoration: none;
    transition: all 0.3s;
    cursor: pointer;
    border: none;
}

.btn-primary {
    background: var(--gold);
    color: var(--navy);
}

.btn-primary:hover {
    background: #B89A5F;
}

.btn-outline {
    border: 1px solid var(--gold);
    color: var(--gold);
    background: transparent;
}

.btn-outline:hover {
    background: rgba(201, 169, 110, 0.1);
}

.btn-explore {
    display: inline-block;
    padding: 1rem 2.5rem;
    background-color: var(--navy);
    color: var(--white);
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: all 0.3s ease;
    font-size: 1rem;
}

.btn-explore:hover {
    background-color: var(--gold);
    color: var(--navy);
}

.cta-section {
    text-align: center;
    padding: 4rem 0;
}

.cta-section p {
    max-width: 600px;
    margin: 0 auto 1.5rem;
    color: var(--dark-gray);
}

.cta-buttons {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
}

/* ===== DISCLAIMER & FOOTER ===== */
.disclaimer {
    text-align: center;
    max-width: 800px;
    margin: 0 auto;
    font-size: 0.82rem;
    color: var(--dark-gray);
    opacity: 0.7;
    line-height: 1.5;
    padding: 0 2rem 3rem;
}

footer {
    background: var(--navy);
    color: rgba(255, 255, 255, 0.7);
    text-align: center;
    padding: 3rem 0;
    font-size: 0.85rem;
}

footer a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: none;
}

footer a:hover {
    color: var(--gold);
}

.footer-disclaimer {
    max-width: 800px;
    margin: 1.5rem auto 0;
    font-size: 0.75rem;
    opacity: 0.6;
    line-height: 1.5;
}

footer p {
    margin-bottom: 0.5rem;
}

/* ===== ANIMATIONS ===== */
.fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* ===== COMMON CONTENT LAYOUTS ===== */
.philosophy-content,
.about-content,
.contact-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    align-items: center;
    margin-top: 2rem;
}

.philosophy-text h3,
.about-text h3 {
    font-size: 1.25rem;
    color: var(--navy);
    margin-bottom: 0.6rem;
    letter-spacing: 1px;
}

.philosophy-text p,
.about-text p {
    margin-bottom: 0.85rem;
    line-height: 1.75;
    color: var(--dark-gray);
    font-size: 0.9rem;
}

.about-photo {
    border-radius: 3px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}

.about-photo img {
    width: 100%;
    height: auto;
    display: block;
}

/* ===== COMPARISON TABLES ===== */
.care-comparison {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-top: 2rem;
}

.comparison-box {
    background: var(--white);
    border-radius: 3px;
    padding: 1.75rem;
    box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
    border: 1px solid rgba(0, 0, 0, 0.04);
}

.comparison-box h3 {
    font-size: 1.2rem;
    color: var(--navy);
    margin-bottom: 1.2rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--hairline);
    letter-spacing: 0.5px;
}

.comparison-box ul {
    list-style: none;
    padding: 0;
}

.comparison-box li {
    padding: 0.8rem 0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    color: var(--dark-gray);
}

.comparison-box li:last-child {
    border-bottom: none;
}

.comparison-box li::before {
    content: '✓ ';
    color: var(--gold);
    font-weight: 700;
    margin-right: 0.5rem;
}

/* ===== CREDENTIALS & RESUME ===== */
.resume-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 3rem;
    margin-top: 2rem;
}

.credentials ul {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
}

.credentials li {
    background: var(--light-gray);
    padding: 1rem;
    border-radius: 3px;
    color: var(--text);
    font-size: 0.88rem;
}

.membership-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.membership-item {
    text-align: center;
    padding: 1.5rem 1.25rem;
    background: var(--white);
    border-radius: 3px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(0, 0, 0, 0.05);
}

.membership-item h4 {
    font-size: 1.1rem;
    color: var(--navy);
    margin-bottom: 0.5rem;
}

.membership-item p {
    font-size: 0.85rem;
    color: var(--dark-gray);
}

/* ===== ADVOCACY BENEFITS ===== */
.advocacy-benefits {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.benefit-item {
    background: var(--light-gray);
    padding: 1.5rem;
    border-radius: 3px;
    border-left: 4px solid var(--gold);
}

.benefit-item h3 {
    font-size: 1.2rem;
    color: var(--navy);
    margin-bottom: 0.8rem;
}

.benefit-item p {
    color: var(--dark-gray);
    font-size: 0.95rem;
}

/* ===== A LA CARTE GRID ===== */
.alacarte-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.alacarte-item {
    background: var(--white);
    border-radius: 3px;
    padding: 2rem;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(0, 0, 0, 0.05);
    transition: transform 0.3s, box-shadow 0.3s;
}

.alacarte-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
}

.alacarte-item h3 {
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 0.8rem;
}

.alacarte-item p {
    color: var(--dark-gray);
    font-size: 0.95rem;
    margin-bottom: 1rem;
}

.alacarte-price {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--gold-dark);
}

/* ===== FORMS ===== */
.contact-form {
    max-width: 600px;
    margin: 2rem auto 0;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--navy);
    font-size: 0.95rem;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 4px;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
}

.form-group textarea {
    resize: vertical;
    min-height: 120px;
}

/* ===== MAPS & STATS ===== */
.map-stat {
    text-align: center;
}

.map-stat .stat-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--navy);
    display: block;
}

.map-stat .stat-label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--dark-gray);
}

/* ===== FLOATING ELEMENTS ===== */
.book-float {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--gold);
    color: var(--navy);
    padding: 0.7rem 1.3rem;
    border-radius: 2px;
    text-decoration: none;
    font-weight: 500;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    transition: all 0.3s ease;
    z-index: 100;
}

.book-float:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
}

.scroll-top {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--navy);
    color: var(--white);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 99;
}

.scroll-top.visible {
    opacity: 1;
    visibility: visible;
}

.scroll-top:hover {
    background: var(--gold);
    color: var(--navy);
}

/* ===== HOMEPAGE HERO ===== */
.hero-home {
    min-height: 88vh;
}

.hero-bg-element {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 550px;
    height: 550px;
    opacity: 0.025;
    pointer-events: none;
    z-index: 0;
}

.hero-content {
    text-align: center;
    max-width: 800px;
    z-index: 2;
    position: relative;
    animation: fadeInUp 1s ease 0.3s both;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== PHILOSOPHY HIGHLIGHT ===== */
.philosophy-highlight {
    background: var(--white);
    padding: 2rem;
    border-left: 4px solid var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--navy);
    font-size: 1.15rem;
    line-height: 1.8;
}

/* ===== MEMBERSHIP CARDS ===== */
.membership-card {
    background: var(--white);
    border-radius: 3px;
    padding: 2rem;
    border-top: 2px solid var(--gold);
    transition: all 0.4s ease;
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
}

.membership-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
}

.membership-card.featured {
    border-top: 2px solid var(--navy);
    position: relative;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
}

.membership-card.featured::before {
    content: 'Most Popular';
    position: absolute;
    top: -1px;
    right: 1.5rem;
    background: var(--navy);
    color: var(--gold);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 0 0 6px 6px;
}

.membership-card h4 {
    font-size: 1.25rem;
    color: var(--navy);
    margin-bottom: 0.4rem;
    letter-spacing: 0.5px;
}

.membership-price {
    font-size: 1.1rem;
    color: var(--gold-dark);
    font-weight: 500;
    margin-bottom: 1.25rem;
}

.membership-card ul {
    list-style: none;
    margin-bottom: 2rem;
}

.membership-card li {
    color: var(--dark-gray);
    padding: 0.6rem 0 0.6rem 1.5rem;
    position: relative;
    font-size: 0.95rem;
}

.membership-card li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--gold-dark);
    font-weight: bold;
}

/* ===== SERVICES À LA CARTE ===== */
.services-alacarte {
    background: var(--white);
    padding: 2rem;
    border-radius: 3px;
    margin-top: 2rem;
}

.services-alacarte h4 {
    color: var(--navy);
    font-size: 1.3rem;
    margin-bottom: 1.5rem;
}

.services-alacarte .alacarte-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 2rem;
}

.services-alacarte .alacarte-item {
    padding: 1.5rem;
    border-left: 3px solid var(--gold);
    background: var(--light-gray);
    border-radius: 4px;
}

.services-alacarte .alacarte-item h5 {
    color: var(--navy);
    margin-bottom: 0.5rem;
    font-size: 1.05rem;
}

.services-alacarte .alacarte-item p {
    color: var(--dark-gray);
    font-size: 0.9rem;
    line-height: 1.6;
}

/* ===== ADVOCACY SECTION ===== */
.advocacy-hero {
    background: linear-gradient(135deg, var(--navy) 0%, #0F2642 100%);
    color: var(--white);
    padding: 2.5rem;
    border-radius: 3px;
    margin-bottom: 3rem;
    text-align: center;
}

.advocacy-hero p {
    font-size: 1.3rem;
    line-height: 1.8;
    color: var(--gold);
    font-weight: 500;
}

.benefit-card {
    padding: 1.5rem;
    background: var(--light-gray);
    border-radius: 3px;
}

.benefit-card h4 {
    color: var(--navy);
    font-size: 1.2rem;
    margin-bottom: 1rem;
}

.benefit-card p {
    color: var(--dark-gray);
    font-size: 0.95rem;
    line-height: 1.7;
}

.scenario {
    background: var(--white);
    border: 1px solid var(--hairline);
    padding: 1.5rem;
    border-radius: 3px;
    border-left: 3px solid var(--gold);
}

.scenario h4 {
    color: var(--navy);
    margin-bottom: 1rem;
    font-size: 1.2rem;
}

.scenario p {
    color: var(--dark-gray);
    line-height: 1.8;
    margin-bottom: 1rem;
    font-size: 0.95rem;
}

/* ===== FAQ SECTION ===== */
.faq-container {
    max-width: 800px;
    margin: 0 auto;
}

.faq-item {
    margin-bottom: 1.5rem;
    border-bottom: 1px solid #E8E4DD;
    padding-bottom: 1.5rem;
}

.faq-item:last-child {
    border-bottom: none;
}

.faq-question {
    font-size: 1rem;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: color 0.3s ease;
}

.faq-question:hover {
    color: var(--gold-dark);
}

.faq-toggle {
    font-size: 1.2rem;
    color: var(--gold-dark);
    transition: transform 0.3s ease;
}

.faq-toggle.open {
    transform: rotate(180deg);
}

.faq-answer {
    margin-top: 1rem;
    color: var(--dark-gray);
    line-height: 1.8;
    font-size: 0.95rem;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
}

.faq-answer.show {
    max-height: 600px;
}

/* ===== CONTACT SECTION ===== */
.contact {
    background: linear-gradient(135deg, var(--navy) 0%, #0F2642 100%);
    color: var(--white);
}

.contact .section-title {
    color: var(--white);
}

.contact-info h3 {
    font-size: 1.2rem;
    margin-bottom: 1rem;
    color: var(--gold);
    letter-spacing: 2px;
}

.contact-info p {
    font-size: 1.05rem;
    margin-bottom: 2rem;
    line-height: 1.8;
    color: rgba(255, 255, 255, 0.9);
}

.contact-detail {
    margin-bottom: 2rem;
}

.contact-detail label {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    display: block;
    margin-bottom: 0.5rem;
}

.contact-detail p {
    font-size: 1.1rem;
    margin: 0;
    color: var(--white);
}

.contact-form-dark {
    background: rgba(255, 255, 255, 0.05);
    padding: 2rem;
    border-radius: 3px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 169, 110, 0.3);
}

.contact-form-dark .form-group label {
    color: var(--gold);
}

.contact-form-dark .form-group input,
.contact-form-dark .form-group textarea {
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);
    color: var(--white);
}

.contact-form-dark .form-group input::placeholder,
.contact-form-dark .form-group textarea::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.contact-form-dark .form-group input:focus,
.contact-form-dark .form-group textarea:focus {
    border-color: var(--gold);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 10px rgba(201, 169, 110, 0.3);
}

.form-submit {
    width: 100%;
    background-color: var(--gold);
    color: var(--navy);
    padding: 1rem;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'Lato', sans-serif;
}

.form-submit:hover {
    background-color: #B8985A;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(201, 169, 110, 0.25);
}

/* ===== PRICING PAGE CARDS ===== */
.pricing-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin-top: 2rem;
}

.pricing-card {
    background: var(--white);
    border-radius: 3px;
    padding: 2rem 1.75rem;
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(0, 0, 0, 0.05);
    text-align: center;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
    position: relative;
}

.pricing-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}

.pricing-card.featured {
    border: 1px solid var(--gold);
    transform: scale(1.02);
}

.pricing-card.featured:hover {
    transform: scale(1.02) translateY(-2px);
}

.pricing-card.featured::before {
    content: 'Most Popular';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--navy);
    padding: 0.3rem 1.2rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.pricing-card h3 {
    font-size: 1.3rem;
    margin-bottom: 0.4rem;
    color: var(--navy);
    letter-spacing: 1px;
}

.pricing-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--gold-dark);
    margin: 0.6rem 0 0.2rem;
}

.pricing-period {
    font-size: 0.85rem;
    color: var(--dark-gray);
    opacity: 0.7;
    margin-bottom: 1.5rem;
}

.pricing-card ul {
    list-style: none;
    text-align: left;
    margin-bottom: 2rem;
}

.pricing-card li {
    padding: 0.5rem 0 0.5rem 1.5rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    font-size: 0.92rem;
    color: var(--dark-gray);
    position: relative;
}

.pricing-card li::before {
    content: '✦';
    position: absolute;
    left: 0;
    color: var(--gold-dark);
    font-size: 0.65rem;
    top: 0.7rem;
}

/* ===== SCHEDULE PAGE STYLES ===== */
.expect-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2rem;
    margin: 3rem 0;
}

.expect-card {
    text-align: center;
    padding: 2rem 1.5rem;
}

.expect-card .step {
    display: inline-block;
    width: 48px;
    height: 48px;
    line-height: 48px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 1rem;
}

.expect-card h3 {
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 0.75rem;
}

.expect-card p {
    font-size: 0.9rem;
    color: var(--dark-gray);
    line-height: 1.7;
}

.form-section {
    background: var(--white);
    border: 1px solid var(--hairline);
    border-radius: 3px;
    padding: 2.5rem;
    margin-top: 1.5rem;
}

.form-section h2 {
    font-size: 2rem;
    color: var(--navy);
    margin-bottom: 0.5rem;
}

.form-section > p {
    color: var(--dark-gray);
    margin-bottom: 2rem;
    font-size: 0.95rem;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
}

.form-group.full {
    grid-column: 1 / -1;
}

.form-group select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #e0ddd8;
    border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: #fff;
    transition: border-color 0.3s;
}

.form-group select:focus {
    outline: none;
    border-color: var(--gold);
}

.form-group .hint {
    font-size: 0.78rem;
    color: var(--dark-gray);
    margin-top: 0.35rem;
}

.checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
}

.checkbox-group input[type="checkbox"] {
    width: auto;
    margin-top: 0.3rem;
    accent-color: var(--gold);
}

.checkbox-group label {
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--dark-gray);
    line-height: 1.6;
}

.submit-btn {
    display: block;
    width: 100%;
    padding: 0.85rem;
    background: var(--navy);
    color: var(--gold);
    border: none;
    border-radius: 3px;
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
}

.submit-btn:hover {
    background: var(--gold);
    color: var(--navy);
}

.privacy-note {
    font-size: 0.75rem;
    color: var(--dark-gray);
    margin-top: 1rem;
    line-height: 1.6;
    text-align: center;
}

.privacy-note a {
    color: var(--gold-dark);
}

.success-message {
    display: none;
    text-align: center;
    padding: 2.5rem 1.5rem;
}

.success-message.visible {
    display: block;
}

.success-message .checkmark {
    font-size: 2.2rem;
    color: var(--gold-dark);
    margin-bottom: 0.75rem;
}

.success-message h3 {
    font-size: 1.4rem;
    color: var(--navy);
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
}

.success-message p {
    color: var(--dark-gray);
    max-width: 500px;
    margin: 0 auto;
}

.info-bar {
    background: var(--navy);
    color: var(--white);
    padding: 2rem 2rem;
    text-align: center;
}

.info-bar-inner {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    gap: 3rem;
    flex-wrap: wrap;
}

.info-item label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
}

.info-item p {
    font-size: 0.88rem;
    opacity: 0.85;
}

.info-item a {
    color: var(--white);
    text-decoration: none;
}

/* ===== COMPARISON SECTION ===== */
.comparison-section {
    background: linear-gradient(170deg, #1B3A5C 0%, #0F2642 100%);
    color: var(--white);
    padding: 4rem 0;
}

.comparison-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2.5rem;
    max-width: 900px;
    margin: 2rem auto 0;
}

.comparison-card {
    padding: 1.8rem;
    border-radius: 3px;
}

.comparison-card.traditional {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.comparison-card.azimuth {
    background: rgba(201, 169, 110, 0.1);
    border: 1px solid rgba(201, 169, 110, 0.25);
}

.comparison-card h3 {
    font-size: 1.15rem;
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
}

.comparison-card.traditional h3 {
    color: rgba(255, 255, 255, 0.6);
}

.comparison-card.azimuth h3 {
    color: var(--gold);
}

.comparison-card p {
    opacity: 0.85;
    font-size: 0.88rem;
    line-height: 1.65;
}

.superbill-note {
    background: var(--light-gray);
    padding: 3rem 0;
    text-align: center;
}

.superbill-note .container {
    max-width: 750px;
}

.superbill-note h3 {
    font-size: 1.3rem;
    color: var(--navy);
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
}

.superbill-note p {
    font-size: 0.88rem;
    color: var(--dark-gray);
    line-height: 1.7;
}

/* ===== STAGGERED ANIMATION DELAYS ===== */
.membership-card.fade-in:nth-child(2) {
    transition-delay: 0.15s;
}

.membership-card.fade-in:nth-child(3) {
    transition-delay: 0.3s;
}

.experiential-card.fade-in:nth-child(2) {
    transition-delay: 0.15s;
}

.experiential-card.fade-in:nth-child(3) {
    transition-delay: 0.3s;
}

.supplement-category.fade-in:nth-child(2) {
    transition-delay: 0.12s;
}

.supplement-category.fade-in:nth-child(3) {
    transition-delay: 0.24s;
}

.supplement-category.fade-in:nth-child(4) {
    transition-delay: 0.36s;
}

.pricing-card.fade-in:nth-child(2) {
    transition-delay: 0.15s;
}

.pricing-card.fade-in:nth-child(3) {
    transition-delay: 0.3s;
}

/* ===== SKIP LINK (ACCESSIBILITY) ===== */
.skip-link {
    position: absolute;
    left: -9999px;
    top: auto;
    width: 1px;
    height: 1px;
    overflow: hidden;
    z-index: 9999;
    padding: 1rem 2rem;
    background: var(--navy);
    color: var(--gold);
    text-decoration: none;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
}

.skip-link:focus {
    position: fixed;
    left: 50%;
    top: 0;
    width: auto;
    height: auto;
    transform: translateX(-50%);
}

/* ===== LUXURY UX POLISH ===== */
body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

a {
    transition: color 0.3s ease, opacity 0.3s ease;
}

.wellness-card,
.experiential-card,
.supplement-category,
.pricing-card,
.membership-card {
    will-change: transform;
}

/* ===== RESPONSIVE DESIGN ===== */

/* Tablet & Medium Screens (768px and down) */
@media (max-width: 768px) {
    .section-title {
        font-size: 1.5rem;
        letter-spacing: 2px;
    }

    .section {
        padding: 3rem 1.5rem;
    }

    .hero h1 {
        font-size: 2rem;
        letter-spacing: 4px;
    }

    .hero .tagline {
        font-size: 0.95rem;
    }

    .hero .subtitle {
        font-size: 0.88rem;
    }

    .page-hero h1 {
        font-size: 1.6rem;
        letter-spacing: 3px;
    }

    .page-hero .tagline {
        font-size: 0.9rem;
    }

    .cta-buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    .cta-buttons a {
        width: 100%;
        max-width: 320px;
        text-align: center;
    }

    .wellness-grid {
        grid-template-columns: 1fr;
    }

    .experiential-grid {
        grid-template-columns: 1fr;
    }

    .supplement-categories {
        grid-template-columns: 1fr;
    }

    .philosophy-content,
    .about-content,
    .contact-content {
        grid-template-columns: 1fr;
    }

    .care-comparison {
        grid-template-columns: 1fr;
        gap: 1.5rem;
    }

    .about-photo {
        position: static;
        max-height: 400px;
    }

    .resume-grid {
        grid-template-columns: 1fr;
    }

    .credentials ul {
        grid-template-columns: 1fr;
    }

    .membership-grid {
        grid-template-columns: 1fr;
    }

    .membership-item {
        padding: 1.5rem;
    }

    .advocacy-benefits {
        grid-template-columns: 1fr;
    }

    .alacarte-grid {
        grid-template-columns: 1fr;
    }

    .about-text h3 {
        font-size: 1.15rem;
    }

    .philosophy-text h3 {
        font-size: 1.1rem;
    }

    nav ul {
        gap: 0.75rem;
        font-size: 0.8rem;
    }

    .divider {
        width: 100px;
    }

    .pricing-grid {
        grid-template-columns: 1fr;
        max-width: 420px;
        margin-left: auto;
        margin-right: auto;
    }

    .pricing-card.featured {
        transform: none;
    }

    .comparison-grid {
        grid-template-columns: 1fr;
    }

    .expect-grid {
        grid-template-columns: 1fr;
    }

    .form-row {
        grid-template-columns: 1fr;
    }

    .info-bar-inner {
        flex-direction: column;
        gap: 1.5rem;
    }
}

/* Mobile Essentials (900px and down - Hamburger Navigation) */
@media (max-width: 900px) {
    .hamburger {
        display: flex;
    }

    nav ul {
        position: fixed;
        top: 0;
        right: -300px;
        width: 280px;
        height: 100vh;
        overflow-y: auto;
        background: var(--navy);
        flex-direction: column;
        padding: 5rem 2rem 2rem;
        gap: 0;
        transition: right 0.3s ease;
        z-index: 999;
        box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
    }

    nav ul.open {
        right: 0;
    }

    nav ul li {
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    nav ul li a {
        display: flex;
        padding: 1rem 0;
        font-size: 1rem;
        min-height: 44px;
        align-items: center;
    }

    nav ul li a::after {
        display: none;
    }

    .nav-dropdown .dropdown-menu {
        position: static;
        transform: none;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: none;
        border: none;
        opacity: 1;
        visibility: visible;
        padding: 0;
        margin: 0;
        min-width: auto;
        border-radius: 0;
    }

    .nav-dropdown .dropdown-menu li a {
        padding: 0.75rem 0 0.75rem 1.5rem;
        font-size: 0.9rem;
        opacity: 0.8;
    }

    .dropdown-arrow {
        transform: rotate(180deg);
        font-size: 0.6rem;
        opacity: 0.5;
    }

    #integrated-care > .container > div:first-of-type {
        grid-template-columns: 1fr;
    }
}

/* Small Phones (480px and down) */
@media (max-width: 480px) {
    h1 {
        font-size: 1.5rem !important;
    }

    h2 {
        font-size: 1.2rem !important;
    }

    h3 {
        font-size: 1.05rem !important;
    }

    nav {
        padding: 0.8rem 1rem !important;
    }

    .logo {
        font-size: 1.15rem !important;
        letter-spacing: 3px !important;
        margin-right: 0.5rem !important;
    }

    .section {
        padding: 2.5rem 1rem;
    }

    .section-title {
        font-size: 1.3rem;
        letter-spacing: 2px;
    }

    .section-subtitle {
        font-size: 0.85rem;
    }

    .divider {
        width: 80px;
    }

    .hero h1 {
        font-size: 1.6rem;
        letter-spacing: 3px;
    }

    .hero {
        padding: 5.5rem 1rem 2.5rem;
    }

    .page-hero {
        padding: 5.5rem 1rem 2rem;
    }

    .page-hero h1 {
        font-size: 1.35rem;
        letter-spacing: 2px;
    }

    .container {
        padding: 0 1rem;
    }

    footer {
        padding: 1.5rem 1rem !important;
    }

    footer p {
        font-size: 0.75rem !important;
    }

    .form-group input,
    .form-group textarea {
        font-size: 16px;
    }

    .btn-explore,
    .btn-primary,
    .btn-outline {
        padding: 0.7rem 1.3rem;
        font-size: 0.78rem;
    }

    .book-float {
        padding: 0.7rem 1rem;
        bottom: 1rem;
        right: 1rem;
        font-size: 0.8rem;
    }

    .scroll-top {
        bottom: 1rem;
        right: 1rem;
        width: 40px;
        height: 40px;
    }

    .form-section {
        padding: 1.25rem;
    }
}

/* ===== PRINT STYLESHEET ===== */
@media print {
    * {
        background: white !important;
        color: black !important;
        box-shadow: none !important;
        text-shadow: none !important;
    }

    nav,
    .nav-overlay,
    .hamburger,
    .book-float,
    .scroll-top,
    .cta-button,
    .btn,
    form,
    .contact-form,
    #navOverlay {
        display: none !important;
    }

    body {
        font-size: 12pt;
        line-height: 1.5;
    }

    h1, h2, h3, h4 {
        page-break-after: avoid;
        color: #1B3A5C !important;
    }

    section {
        page-break-inside: avoid;
        padding: 1rem 0 !important;
    }

    .hero,
    .page-hero {
        padding: 2rem 0 !important;
        min-height: auto !important;
    }

    .hero h1,
    .page-hero h1 {
        font-size: 24pt;
    }

    .tagline,
    .subtitle {
        color: #333 !important;
    }

    .section-title {
        font-size: 18pt;
    }

    img {
        max-width: 100% !important;
    }

    a {
        text-decoration: underline;
    }

    a[href^="http"]::after {
        content: " (" attr(href) ")";
        font-size: 9pt;
        color: #666 !important;
    }

    footer {
        border-top: 1px solid #ccc;
        padding-top: 1rem !important;
    }

    .footer-disclaimer {
        font-size: 9pt;
    }

    .container {
        max-width: 100% !important;
        padding: 0 1rem !important;
    }
}

/* ===== ACCESSIBILITY ===== */
@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
    }

    .fade-in {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
    }
}

