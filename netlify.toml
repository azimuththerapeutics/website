    <script>
    function handleScheduleSubmit(e) {
        e.preventDefault();
        var form = e.target;
        var email = form.querySelector('#email').value;
        var phone = form.querySelector('#phone').value.replace(/\D/g, '');
        var dob = form.querySelector('#dob').value;

        // Validate email format
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            alert('Please enter a valid email address.');
            return;
        }

        // Validate phone (at least 10 digits)
        if (phone.length < 10) {
            alert('Please enter a valid phone number with area code.');
            return;
        }

        // Validate age (must be 18+)
        if (dob) {
            var birth = new Date(dob);
            var today = new Date();
            var age = today.getFullYear() - birth.getFullYear();
            var m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            if (age < 18) {
                alert('Patients must be 18 years or older. For adolescent referrals, please contact us by phone.');
                return;
            }
        }

        // Submit to Formspree
        // SETUP: Replace YOUR_FORM_ID with your Formspree form ID (e.g., xABCDEFG)
        var formspreeId = 'mvzwkoan';
        var formData = new FormData(form);

        fetch('https://formspree.io/f/' + formspreeId, {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'application/json' }
        }).then(function(response) {
            if (response.ok) {
                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successMessage').classList.add('visible');
                window.scrollTo({ top: document.getElementById('successMessage').offsetTop - 100, behavior: 'smooth' });
            } else {
                alert('There was a problem submitting your request. Please call (203) 718-6513 instead.');
            }
        }).catch(function() {
            alert('There was a problem submitting your request. Please call (203) 718-6513 instead.');
        });
    }
    </script>

