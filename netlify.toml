                        <li>Patients needing integrated therapy + medication</li>
                        <li>Patients dissatisfied with high-volume psychiatry</li>
                        <li>PTSD &amp; trauma (including military/first responder)</li>
                        <li>Dual-diagnosis / substance use considerations</li>
                    </ul>
