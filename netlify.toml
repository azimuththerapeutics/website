            <p class="fade-in">Arthur holds dual licensure as a Psychiatric-Mental Health Nurse Practitioner (PMHNP-BC) and Licensed Clinical Social Worker (LCSW). This allows him to provide both medication management and psychotherapy within a single appointment — eliminating the coordination burden that split-care models create for patients and referring providers.</p>

