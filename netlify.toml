    <!-- TALK THERAPY SECTION -->
    <section class="section talk-therapy" id="talk-therapy" style="background: var(--light-gray);">
        <div class="container">
            <h2 class="section-title fade-in">Talk Therapy</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <p class="fade-in" style="text-align: center; max-width: 700px; margin: 0 auto 2rem; color: var(--dark-gray); font-size: 0.95rem; line-height: 1.75;">
                Because your prescriber is also a licensed clinical social worker, every session can seamlessly integrate psychotherapy with medication management. No referral to a separate therapist. No fragmented care. One clinician who knows the full picture.
            </p>

            <div class="experiential-grid">
                <div class="experiential-card fade-in">
                    <h4>Individual Psychotherapy</h4>
                    <p>Evidence-based modalities including CBT, motivational interviewing, psychodynamic therapy, and trauma-focused approaches — tailored to your needs and adapted session to session. Therapy isn't a separate appointment; it's woven into every encounter.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Integrated Sessions</h4>
                    <p>Every session blends therapeutic work with medication review. We discuss how your medications are affecting your mood, your sleep, your relationships — and adjust both the prescription and the therapeutic approach in real time.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Crisis &amp; Stabilization</h4>
                    <p>When things escalate, your provider already knows your history, your coping strategies, and your support system. No intake paperwork. No retelling your story. Immediate, informed intervention from someone who knows you.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ADVOCACY SECTION -->
    <section class="section advocacy" id="advocacy">
        <div class="container">
            <h2 class="section-title fade-in">Emergency Department Advocacy</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <div class="advocacy-content">
                <div class="advocacy-hero fade-in">
                    <p>"When you arrive at the Emergency Department, your psychiatric care shouldn't be lost in translation."</p>
                </div>

                <div class="advocacy-benefits">
                    <div class="benefit-card fade-in">
                        <h4>What You Receive</h4>
                        <p>A psychiatric clinician who knows your history, your medications, your treatment plan, and your goals—available to ED staff for direct consultation. Not a chart note, but a real conversation.</p>
                    </div>
                    <div class="benefit-card fade-in">
                        <h4>Why It Matters</h4>
                        <p>ED staff are exceptional at acute medical crises. They are not specialists in complex psychiatric care. You deserve a clinician who bridges that gap and advocates for continuity of your treatment.</p>
                    </div>
                </div>

                <div class="scenario fade-in">
                    <h4>A Real-World Scenario</h4>
                    <p><strong>7:15 AM on Saturday.</strong> Your family finds you in acute psychiatric distress and calls 911. You arrive at the ED experiencing suicidal ideation, dissociation, and severe anxiety.</p>
                    <p>The ED team initiates a psychiatric hold. A psychiatrist is called for consultation, but they're seeing patients on the inpatient unit and know nothing about you. They review your chart—it's incomplete and outdated. They recommend admission to the psychiatric unit and place you on an antipsychotic you tried years ago and had a terrible reaction to.</p>
                    <p><strong>With Azimuth advocacy:</strong> The ED team contacts your concierge psychiatric provider at 7:30 AM. Within minutes, they learn your psychiatric history, your current medication regimen, your previous adverse reactions, and your treatment goals. Your provider provides real-time recommendations for stabilization and disposition, communicates directly with the ED team, and arranges seamless transfer to coordinated inpatient care. Your treatment isn't interrupted. You are not re-traumatized by inappropriate medication.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- EXPERIENTIAL THERAPY SECTION -->
    <section class="section experiential" id="experiential">
        <div class="container">
            <h2 class="section-title fade-in">Experiential Therapy</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <div class="experiential-highlight fade-in">
                <p>"Skiing is my therapy. Running clears my head. The river is where I find peace."</p>
                <p class="experiential-highlight-text">People say this all the time — and they're not wrong. Now imagine what happens when your psychiatric provider is actually there with you, turning that instinct into real clinical work.</p>
            </div>

            <p class="experiential-intro fade-in">When medically and therapeutically appropriate, Azimuth integrates movement-based and outdoor experiences directly into the therapeutic session — not as recreation, but as clinically guided interventions that complement traditional psychiatric care.</p>

            <div class="experiential-grid">
                <div class="experiential-card fade-in">
                    <h4>Movement-Based Sessions</h4>
                    <p>Trail running, hiking, gravel biking, and walking sessions in nature engage the body's stress response systems while creating space for therapeutic processing. Movement activates parasympathetic pathways that a clinical office cannot—building lasting capacity for emotional regulation.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Challenge &amp; Mastery</h4>
                    <p>Skiing, mountain biking, ice climbing, and paddling demand present-moment awareness and progressive skill building. These experiences—conducted in the setting of a therapeutic session—create concrete evidence of competence that directly counters the cognitive distortions of depression and anxiety.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Grounded Connection</h4>
                    <p>Sometimes the best session happens sitting in a park, fly fishing, or walking a trail together. Shared outdoor experience fosters authentic connection and opens therapeutic doors that a traditional office setting cannot. Every experiential session is guided by clinical judgment and your individual treatment goals.</p>
                </div>
            </div>

            <!-- Adventure map available at /map/index.html (unlisted) -->
        </div>
    </section>

    <!-- PHARMACOLOGICAL INTERVENTIONS SECTION -->
    <section class="section pharmacological" id="pharmacological">
        <div class="container">
            <h2 class="section-title fade-in">Pharmacological Interventions</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <p class="fade-in" style="text-align: center; max-width: 700px; margin: 0 auto 2rem; color: var(--dark-gray); font-size: 0.95rem; line-height: 1.75;">
                Medication is one tool among many — used thoughtfully, monitored closely, and always in the context of your whole treatment plan. As an advanced practice prescriber, AJ brings the clinical depth to manage complex regimens while knowing you well enough to know when less is more.
            </p>

            <div class="experiential-grid">
                <div class="experiential-card fade-in">
                    <h4>Medication Management</h4>
                    <p>Comprehensive psychopharmacology for depression, anxiety, PTSD, ADHD, bipolar disorder, insomnia, and treatment-resistant conditions. Every prescribing decision is informed by your therapy, your lifestyle, and your goals — not just your symptoms.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Treatment Optimization</h4>
                    <p>Second-opinion reviews, medication simplification, cross-taper management, and augmentation strategies for patients who haven't responded to standard approaches. Includes consideration of pharmacogenomic data when clinically relevant.</p>
                </div>
                <div class="experiential-card fade-in">
                    <h4>Supportive Strategies</h4>
                    <p>Evidence-based guidance on sleep hygiene, nutrition, exercise, and targeted supplementation when appropriate — always coordinated with your medication regimen and individualized to your treatment plan.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- FAQ SECTION -->
    <section class="section faq" id="faq">
        <div class="container">
            <h2 class="section-title fade-in">Frequently Asked Questions</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <div class="faq-container">
                <div class="faq-item fade-in">
                    <div class="faq-question" onclick="toggleFAQ(this)">
                        <span>Is concierge psychiatry covered by insurance?</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p>No. Concierge psychiatry operates outside the insurance model because we prioritize your care over insurance approval requirements. However, we provide superbills that you can submit to your insurance for partial reimbursement, depending on your plan. We're happy to discuss this in detail during your initial consultation.</p>
                    </div>
                </div>

                <div class="faq-item fade-in">
                    <div class="faq-question" onclick="toggleFAQ(this)">
                        <span>What makes this different from regular psychiatry?</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p><strong>Time:</strong> We don't operate under insurance productivity metrics. Sessions are unhurried and thorough.</p>
                        <p><strong>Access:</strong> You have direct communication channels to your provider. No gatekeeping.</p>
                        <p><strong>Integration:</strong> We combine medication management, therapy, and advocacy in one place. You're not managing multiple providers.</p>
                        <p><strong>Advocacy:</strong> We actively advocate for your care in complex situations, including ED liaison and provider coordination.</p>
                    </div>
                </div>

                <div class="faq-item fade-in">
                    <div class="faq-question" onclick="toggleFAQ(this)">
                        <span>Can I keep my current therapist?</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p>Absolutely. We coordinate with your existing therapist. In fact, we believe the best psychiatric care involves collaboration with your treatment team. We provide direct communication and integrated care coordination to ensure everyone is aligned on your treatment plan.</p>
                    </div>
                </div>

                <div class="faq-item fade-in">
                    <div class="faq-question" onclick="toggleFAQ(this)">
                        <span>What if I have a psychiatric emergency?</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p>If you're in immediate danger, call 911 or go to your nearest Emergency Department. Your safety is the priority. Concierge psychiatry supplements, not replaces, emergency services. That said, once you're at the ED, your concierge psychiatric provider can provide the advocacy and continuity of care described above.</p>
                    </div>
                </div>

                <div class="faq-item fade-in">
                    <div class="faq-question" onclick="toggleFAQ(this)">
                        <span>How do I get started?</span>
                        <span class="faq-toggle">▼</span>
                    </div>
                    <div class="faq-answer">
                        <p>Complete the contact form below or call us directly. We'll schedule a brief phone consultation to discuss your needs, answer questions, and determine if we're a good fit. We're accepting a limited number of new clients to ensure personalized, high-quality care for everyone.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

