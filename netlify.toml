    <!-- PHILOSOPHY SECTION -->
    <section class="section philosophy" id="philosophy">
        <div class="container">
            <h2 class="section-title fade-in">Our Philosophy</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <div class="philosophy-content">
                <div>
                    <h3 class="fade-in">Mental Health as Investment</h3>
                    <p class="fade-in">At Azimuth, we believe that quality psychiatric care should be as intentional and curated as any other aspect of your well-being. We reject the assembly-line model of 15-minute medication checks, where patients become case numbers and complexity is a liability.</p>
                    <p class="fade-in">Instead, we offer integrated care that honors both the art and science of psychiatry—combining evidence-based medication management with meaningful therapeutic work, holistic assessment, and genuine partnership in your recovery.</p>
                </div>

                <div>
                    <div class="philosophy-highlight fade-in">
                        "Just as a fine home is worth its investment because you live in it for years, quality mental healthcare is an investment in the life you live every day."
                    </div>
                    <p class="fade-in philosophy-text">We treat the whole person—not just the diagnosis. We consider your medical history, your life circumstances, your values, and your goals. We listen. We adapt. We advocate.</p>
                    <p class="fade-in">This is what bespoke psychiatric care means.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- WHY INTEGRATED CARE SECTION -->
    <section class="section integrated-care" id="integrated-care" style="background: linear-gradient(135deg, var(--navy) 0%, #0F2642 100%); color: var(--white); padding: 4rem 0;">
        <div class="container">
            <h2 class="section-title fade-in section-title-light">Why Integrated Care Matters</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>
            <div class="care-comparison">
                <div class="fade-in care-box">
                    <h3>Traditional Psychiatry</h3>
                    <p>See a psychiatrist for 15-minute medication checks. See a separate therapist for talk therapy. Two providers, two relationships, two bills, two offices—and neither has the full picture.</p>
                    <p class="care-box-summary">Two providers, two sets of fees, and fragmented care.</p>
                </div>
                <div class="fade-in care-box care-box-azimuth">
                    <h3>Azimuth Integrated Model</h3>
                    <p>One provider who prescribes and delivers psychotherapy. Every session integrates both. Your therapist knows your medications. Your prescriber knows your inner life. Nothing falls through the cracks.</p>
                    <p class="care-box-summary">One provider, one relationship, one comprehensive approach.</p>
                </div>
            </div>
            <p class="fade-in care-summary">Dual credentials (PMHNP-BC + LCSW) mean broader scope than a psychiatrist alone—not less. You get more comprehensive care from one trusted clinician.</p>
        </div>
    </section>

    <!-- ABOUT SECTION -->
    <section class="section about" id="about">
        <div class="container">
            <h2 class="section-title fade-in">Meet Your Provider</h2>
            <div class="divider" role="presentation" aria-hidden="true">
                <svg viewBox="0 0 240 12" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0,6 C30,3 50,9 80,6 C110,3 130,9 160,6 C190,3 210,9 240,6"
                          fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
                </svg>
            </div>

            <div class="about-content">
                <div class="about-photo fade-in" role="img" aria-label="Arthur J. Anderson, APRN, PMHNP-BC, LCSW">
                </div>

                <div class="about-text fade-in">
                    <h3>Arthur J. Anderson</h3>
                    <p class="about-credentials">APRN, PMHNP&#8209;BC, LCSW</p>

                    <p>Arthur J. Anderson is a psychiatric nurse practitioner and clinical social worker whose work blends evidence&#8209;based practice with a deeply human, whole&#8209;person philosophy. His path began with three tours with the United States Marine Corps, a chapter that laid the foundation for his commitment to resilience, service, and grounded leadership.</p>

                    <p>Following his military service, Arthur earned a Bachelor of Science in Business Management from the University of New Haven, a Master of Social Work from Columbia University, and later completed both a Certificate in Nursing and a Master of Science in Nursing at Yale University. This diverse training allows him to approach care with both clinical precision and a grounded, compassionate presence.</p>

                    <p>Licensed in Connecticut as both a Clinical Social Worker and an Advanced Practice Registered Nurse, Arthur has supported individuals and families across nearly every level of psychiatric care. His experience spans inpatient residential programs, inpatient hospital units, outpatient hospital services, psychiatric emergency rooms, and consultation&#8209;liaison psychiatry. This breadth of experience gives him a nuanced understanding of how people move through different stages of treatment, recovery, and change.</p>

                    <p>Arthur's clinical approach is also shaped by years of experiential and adventure&#8209;based work, including ropes&#8209;course facilitation, outdoor leadership, camping&#8209;based therapeutic programs, and climbing&#8209;centered interventions. He believes that learning through movement, challenge, and embodied experience can open doors that traditional talk therapy alone cannot. As a 200&#8209;hour trained yoga teacher, he integrates mindfulness, breathwork, and somatic awareness to help clients reconnect with their bodies and cultivate steadiness from the inside out.</p>

                    <p>His diverse background also informs his prescribing philosophy. Arthur approaches medication as one tool among many, used thoughtfully and only when appropriate — and determining what is appropriate begins with truly knowing the individual. He is open to a range of holistic and non&#8209;pharmacological strategies, including lifestyle&#8209;based approaches and supportive supplementation when suitable.</p>

                    <div class="resume-grid fade-in">
                        <div class="resume-section">
                            <h4>Clinical Education</h4>
                            <ul>
                                <li><strong>Yale School of Nursing</strong><br>Master of Science in Nursing — Psychiatric Mental Health</li>
                                <li><strong>Columbia University</strong><br>Master of Science in Social Work</li>
                                <li><strong>University of New Haven</strong><br>Bachelor of Science in Business Management</li>
                            </ul>
                        </div>
                        <div class="resume-section">
                            <h4>Licensure &amp; Certifications</h4>
                            <ul>
                                <li><strong>Advanced Practice Registered Nurse</strong> (CT)</li>
                                <li><strong>Licensed Clinical Social Worker</strong> (CT)</li>
                                <li><strong>United States Marine Corps</strong> (2009–2013)</li>
                                <li>Wilderness First Aid &amp; Stop the Bleed</li>
                                <li>200-Hour Yoga Teacher Training</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

