    <section class="page-hero" id="main-content">
        <h1>Privacy Policy</h1>
        <p>Notice of Privacy Practices</p>
    </section>

    <div class="content">
        <div class="effective-date">
            <strong>Effective Date:</strong> March 2026<br>
            <strong>Last Updated:</strong> March 2026
        </div>

        <h2>Overview</h2>
        <p>Azimuth Therapeutics, LLC ("Azimuth," "we," "our") is committed to protecting the privacy and security of your personal and health information. This notice describes how medical information about you may be used and disclosed and how you can access this information.</p>

        <h2>Information We Collect</h2>
        <h3>Through This Website</h3>
        <p>This website collects minimal data. We use Plausible Analytics, a privacy-first analytics service that does not use cookies, does not track individuals, and does not collect personal information. No data is shared with advertising networks or third parties.</p>
        <p>If you submit a contact form on this website, we collect the information you provide (name, email, phone number, message content) solely for the purpose of responding to your inquiry. Contact form submissions are not part of your medical record unless you subsequently become a patient.</p>

        <h3>As a Patient</h3>
        <p>When you become a patient of Azimuth Therapeutics, we collect protected health information (PHI) as required for your psychiatric care, including but not limited to:</p>
        <ul>
            <li>Demographic information (name, date of birth, contact information)</li>
            <li>Medical and psychiatric history</li>
            <li>Medication records and prescriptions</li>
            <li>Treatment plans, progress notes, and clinical assessments</li>
            <li>Insurance information (if applicable)</li>
            <li>Billing and payment records</li>
        </ul>

        <h2>How We Use and Disclose Your Information</h2>
        <h3>Treatment</h3>
        <p>We may use your health information to provide, coordinate, or manage your psychiatric care. This includes sharing information with other healthcare providers involved in your care with your consent.</p>

        <h3>Payment</h3>
        <p>We may use your health information to obtain payment for services, including generating superbills for insurance reimbursement if requested.</p>

        <h3>Healthcare Operations</h3>
        <p>We may use your health information for practice operations including quality assessment, care coordination, and compliance activities.</p>

        <h3>Psychotherapy Notes</h3>
        <p>Psychotherapy notes receive heightened protection under HIPAA. We will not use or disclose psychotherapy notes without your specific written authorization, except as permitted or required by law.</p>

        <h3>Required by Law</h3>
        <p>We may disclose your health information when required by federal, state, or local law, including but not limited to mandated reporting obligations (e.g., suspected abuse or neglect, imminent danger to self or others).</p>

        <h2>Your Rights</h2>
        <p>Under HIPAA and Connecticut law, you have the right to:</p>
        <ul>
            <li><strong>Access your records:</strong> Request and obtain a copy of your health information</li>
            <li><strong>Request amendments:</strong> Ask us to correct information you believe is inaccurate</li>
            <li><strong>Request restrictions:</strong> Ask us to limit how we use or disclose your information</li>
            <li><strong>Confidential communications:</strong> Request that we communicate with you by specific means or at specific locations</li>
            <li><strong>Accounting of disclosures:</strong> Request a list of certain disclosures we have made of your information</li>
            <li><strong>File a complaint:</strong> File a complaint with us or with the U.S. Department of Health and Human Services if you believe your privacy rights have been violated</li>
        </ul>

        <h2>Data Security</h2>
        <p>We implement administrative, physical, and technical safeguards to protect your health information, including:</p>
        <ul>
            <li>HIPAA-compliant electronic health record systems with encryption</li>
            <li>HIPAA-compliant telehealth platforms for remote sessions</li>
            <li>Secure electronic prescribing (EPCS) for controlled substances</li>
            <li>Role-based access controls limiting information access to authorized personnel</li>
            <li>Regular security assessments and staff training</li>
        </ul>

        <h2>Third-Party Services</h2>
        <p>We use the following third-party services in connection with your care. Each maintains its own privacy practices and Business Associate Agreements (BAAs) with Azimuth as required by HIPAA:</p>
        <ul>
            <li><strong>Electronic Health Records:</strong> HIPAA-compliant EHR platform with BAA</li>
            <li><strong>Telehealth:</strong> HIPAA-compliant video platform with BAA</li>
            <li><strong>Payment Processing:</strong> PCI-compliant payment processor for membership fees</li>
            <li><strong>Formspree</strong> — Processes contact and scheduling form submissions</li>
        </ul>

        <h2>Record Retention</h2>
        <p>In accordance with Connecticut law, medical records are retained for a minimum of seven (7) years from the last date of treatment. Controlled substance prescription records are retained for a minimum of three (3) years.</p>

        <h2>Changes to This Policy</h2>
        <p>We reserve the right to update this privacy policy. Changes will be posted on this page with an updated effective date. Material changes to how we handle PHI will be communicated directly to active patients.</p>

        <h2>Contact Information</h2>
        <div class="contact-info">
            <p><strong>Privacy Officer:</strong> Arthur Anderson, APRN, PMHNP-BC, LCSW</p>
            <p><strong>Practice:</strong> Azimuth Therapeutics, LLC</p>
            <p><strong>Address:</strong> 267 Grant Street, Greater New Haven Area, CT 06610</p>
            <p><strong>Phone:</strong> <a href="tel:+12037186513">(203) 718-6513</a></p>
            <p><strong>Email:</strong> <a href="mailto:info@azimuththerapeutics.com">info@azimuththerapeutics.com</a></p>
        </div>

        <p style="font-size: 0.85rem; color: #999; margin-top: 2rem;">To file a complaint with the U.S. Department of Health and Human Services Office for Civil Rights, visit <a href="https://www.hhs.gov/hipaa/filing-a-complaint/index.html" target="_blank" rel="noopener">hhs.gov/hipaa/filing-a-complaint</a> or call 1-800-368-1019.</p>
    </div>

