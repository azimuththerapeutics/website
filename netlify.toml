                    <h3>Traditional Psychiatry</h3>
                    <p>See a psychiatrist for 15-minute medication checks. See a separate therapist for talk therapy. Two providers, two relationships, two bills, two offices — and neither has the full picture.</p>
                    <p style="margin-top: 1rem; font-style: italic; opacity: 0.6; font-size: 0.9rem;">Two providers, two sets of fees, fragmented care.</p>
                </div>
