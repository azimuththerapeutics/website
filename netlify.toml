        <h1>Schedule a Consultation</h1>
        <p>Take the first step toward care that sees you as a whole person. Complete the form below and we'll be in touch within one business day to schedule your initial consultation.</p>
    </div>

    <div class="container">
        <!-- WHAT TO EXPECT -->
        <div class="expect-grid">
            <div class="expect-card">
                <span class="step">1</span>
                <h3>Submit Request</h3>
                <p>Complete the brief intake form below. No sensitive health information needed at this stage.</p>
            </div>
            <div class="expect-card">
                <span class="step">2</span>
                <h3>We Connect</h3>
                <p>We'll reach out within one business day to discuss your needs and schedule your first appointment.</p>
            </div>
            <div class="expect-card">
                <span class="step">3</span>
                <h3>Initial Consultation</h3>
                <p>A 60-minute comprehensive evaluation, in person or via telehealth. No rushed visits.</p>
            </div>
        </div>

        <!-- FORM -->
        <div class="form-section" id="formSection">
            <h2>Consultation Request</h2>
            <p>Fields marked with * are required. This form is for scheduling purposes only.</p>

            <form id="scheduleForm" onsubmit="handleScheduleSubmit(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
