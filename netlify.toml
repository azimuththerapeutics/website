                <form class="subscribe-form" onsubmit="event.preventDefault(); var btn=this.querySelector('button'); btn.textContent='Subscribed!'; btn.style.background='#5a8c5a'; var f=this; setTimeout(function(){ f.reset(); btn.textContent='Notify Me'; btn.style.background=''; }, 3000);">
