<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0}
#app{display:flex;height:100vh}
#sidebar{width:380px;background:#1e293b;display:flex;flex-direction:column;border-right:1px solid #334155;overflow:hidden}
#map-container{flex:1;position:relative}
#map{height:100%;width:100%}
.header{padding:16px;background:linear-gradient(135deg,#1e3a5f,#0f766e);border-bottom:1px solid #334155}
.header h1{font-size:16px;font-weight:700;color:#fff;margin-bottom:2px}
.header p{font-size:11px;color:#94a3b8}
.search-box{padding:10px 16px;border-bottom:1px solid #334155}
.search-box input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.search-box input:focus{border-color:#0ea5e9}
.search-box input::placeholder{color:#64748b}
.system-filter{padding:8px 16px;border-bottom:1px solid #334155}
.system-filter label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;display:block;margin-bottom:4px}
.system-filter select{width:100%;padding:6px 10px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:12px;outline:none;cursor:pointer}
.system-filter select:focus{border-color:#0ea5e9}
.layers{padding:10px 16px;border-bottom:1px solid #334155;max-height:300px;overflow-y:auto}
.layers h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:8px}
.layer-group{margin-bottom:10px}
.layer-group-title{font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:6px}
.layer-group-title:hover{color:#e2e8f0}
.layer-group-title .arrow{transition:transform .2s;font-size:10px}
.layer-group-title .arrow.open{transform:rotate(90deg)}
.layer-items{padding-left:8px}
.layer-item{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;font-size:12px}
.layer-item:hover{color:#fff}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,.2)}
.layer-check{width:14px;height:14px;border-radius:3px;border:1px solid #475569;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;cursor:pointer}
.layer-check.active{background:#0ea5e9;border-color:#0ea5e9}
.results{flex:1;overflow-y:auto;padding:8px 12px}
.result-card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.result-card:hover{border-color:#0ea5e9;transform:translateX(2px)}
.result-card.warning{border-left:3px solid #f59e0b}
.result-card.alert-yellow{border-left:3px solid #f59e0b}
.result-card.alert-red{border-left:3px solid #ef4444;opacity:.85}
.result-card.alert-blue{border-left:3px solid #3b82f6}
.result-alert{font-size:10px;padding:3px 6px;border-radius:4px;margin-top:4px;display:inline-block}
.alert-bg-yellow{background:#78350f;color:#fbbf24}
.alert-bg-red{background:#7f1d1d;color:#fca5a5}
.alert-bg-blue{background:#1e3a5f;color:#93c5fd}
.result-drive{font-size:10px;color:#475569;margin-top:2px}
.result-card.closed{border-left:3px solid #ef4444;opacity:.7}
.result-name{font-size:13px;font-weight:600;color:#f1f5f9}
.result-type{font-size:10px;color:#64748b;margin-top:1px}
.result-detail{font-size:11px;color:#94a3b8;margin-top:4px}
.result-phone{font-size:11px;color:#38bdf8;margin-top:2px}
.result-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase}
.tag-ip{background:#1e3a5f;color:#60a5fa}
.tag-php{background:#1a3a2a;color:#4ade80}
.tag-iop{background:#3a2a1a;color:#fbbf24}
.tag-crisis{background:#3a1a1a;color:#f87171}
.tag-sud{background:#2a1a3a;color:#c084fc}
.tag-shelter{background:#3a2a0a;color:#f97316}
.tag-food{background:#1a2a0a;color:#84cc16}
.tag-gym{background:#0a2a1a;color:#10b981}
.tag-yoga{background:#2a0a2a;color:#d946ef}
.tag-cannabis{background:#1a2a0a;color:#65a30d}
.tag-bio{background:#2a1a2a;color:#f472b6}
.tag-sud{background:#2a1a3a;color:#c084fc}
.tag-shelter{background:#1a2a3a;color:#67e8f9}
.tag-food{background:#2a3a1a;color:#a3e635}
.tag-recovery{background:#1a3a3a;color:#2dd4bf}
.tag-warning{background:#78350f;color:#fbbf24}
.tag-closed{background:#7f1d1d;color:#fca5a5}
.result-nav{display:inline-block;font-size:10px;color:#0ea5e9;text-decoration:none;margin-top:4px}
.result-nav:hover{color:#38bdf8;text-decoration:underline}
.result-count{padding:8px 16px;font-size:11px;color:#64748b;border-bottom:1px solid #334155}
.popup-content{font-family:'Segoe UI',sans-serif;max-width:280px}
.popup-content h3{font-size:14px;color:#1e293b;margin-bottom:4px}
.popup-content .p-type{font-size:11px;color:#64748b;margin-bottom:6px}
.popup-content .p-detail{font-size:12px;color:#334155;margin-bottom:4px}
.popup-content .p-phone{font-size:12px;color:#0369a1;font-weight:600}
.popup-content .p-nav{display:inline-block;margin-top:6px;padding:4px 10px;background:#0ea5e9;color:#fff;border-radius:4px;text-decoration:none;font-size:11px}
.popup-content .p-nav:hover{background:#0284c7}
.popup-content .p-tags{margin-top:6px}
.popup-content .p-tag{display:inline-block;padding:1px 5px;margin:1px;border-radius:3px;font-size:9px;font-weight:600;background:#e0f2fe;color:#0369a1}
.update-banner{background:#78350f;color:#fbbf24;padding:6px 12px;font-size:11px;text-align:center;cursor:pointer}
.update-banner:hover{background:#92400e}
.stats-bar{display:flex;gap:12px;padding:8px 16px;border-bottom:1px solid #334155;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:16px;font-weight:700;color:#0ea5e9}
.stat-label{font-size:9px;color:#64748b;text-transform:uppercase}
.map-controls{position:absolute;top:10px;right:10px;z-index:1000;display:flex;flex-direction:column;gap:6px}
.map-btn{background:#1e293b;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;white-space:nowrap;font-family:inherit}
.map-btn:hover{background:#334155;border-color:#0ea5e9}
.map-btn.active{background:#0ea5e9;color:#fff;border-color:#0ea5e9}
.nav-links{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.nav-link{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-decoration:none;color:#e2e8f0;cursor:pointer}
.nav-drive{background:#3b82f6}.nav-transit{background:#22c55e}.nav-walk{background:#f59e0b}
.nav-drive:hover{background:#2563eb}.nav-transit:hover{background:#16a34a}.nav-walk:hover{background:#d97706}
@media(max-width:768px){#sidebar{width:100%;height:50vh}#app{flex-direction:column}}
</style>

// HOME BASE (Bridgeport Hospital)
const HOME_LAT=41.1734,HOME_LNG=-73.1891;
// CLOSURES / ALERTS
const CLOSURES=[
{match:'Connecticut Valley Hospital',msg:'📋 State facility—referral through DMHAS local mental health authority required',severity:'blue'},
{match:'Whiting Forensic',msg:'📋 Forensic facility—court-ordered admissions only',severity:'blue'},
{match:'988 Suicide',msg:'⚠️ If in crisis, call 988 now—24/7 support available',severity:'yellow'},
{match:'Safe Connect',msg:'⚠️ If in immediate danger, call 911 first, then Safe Connect',severity:'yellow'},
{match:'ACCESS Mental Health for Moms',msg:'📋 Provider consultation line—not for direct patient use',severity:'blue'},
{match:'Silver Hill',msg:'📋 Private pay / limited insurance—verify coverage before referral',severity:'blue'},
{match:'McLean',msg:'📋 2-2.5hr from BPT—consider for specialty referrals only',severity:'blue'},
{match:'Bellevue',msg:'📋 NYC H+H—2hr+ drive; use for forensic/specialty only',severity:'blue'},
{match:'CAN (Coordinated',msg:'⚠️ Call 211 → press 3 → press 1 for housing intake',severity:'yellow'}
];
// Pre-compute drive distance from Bridgeport Hospital
LOCATIONS.forEach(loc=>{
    const R=3959;
    const dLat=(loc.lat-HOME_LAT)*Math.PI/180;
    const dLng=(loc.lng-HOME_LNG)*Math.PI/180;
    const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(HOME_LAT*Math.PI/180)*Math.cos(loc.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    loc.distMi=Math.round(R*c);
    loc.driveMin=Math.round(loc.distMi/35*60); // lower avg speed for local/urban
    loc.driveHr=(loc.driveMin/60).toFixed(1);
});
// Apply closure alerts
LOCATIONS.forEach(loc=>{
    const cl=CLOSURES.find(c=>loc.name.includes(c.match));
    if(cl){loc.alert=cl.msg;loc.alertSeverity=cl.severity;}
});
function formatDrive(loc){
    if(!loc.driveMin||loc.distMi<2)return '';
    if(loc.driveMin<60)return`~${loc.driveMin}min`;
    return`~${loc.driveHr}hr`;
}
// MAP INIT
const map=L.map('map',{zoomControl:true}).setView([41.35,-72.9],9);
// Tile layers
const darkTile=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19});
const streetTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:19});
const satTile=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Esri World Imagery',maxZoom:19});
darkTile.addTo(map);
let currentTile='dark';
// Map view controls
const ctrlDiv=document.createElement('div');
ctrlDiv.className='map-controls';
ctrlDiv.innerHTML=`<button class="map-btn active" id="btn-dark">Dark</button><button class="map-btn" id="btn-street">Street</button><button class="map-btn" id="btn-sat">Satellite</button>`;
document.getElementById('map-container').appendChild(ctrlDiv);
function switchTile(name){
    map.removeLayer(darkTile);map.removeLayer(streetTile);map.removeLayer(satTile);
    if(name==='dark')darkTile.addTo(map);
    else if(name==='street')streetTile.addTo(map);
    else satTile.addTo(map);
    currentTile=name;
    document.querySelectorAll('.map-controls .map-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+name).classList.add('active');
}
document.getElementById('btn-dark').addEventListener('click',()=>switchTile('dark'));
document.getElementById('btn-street').addEventListener('click',()=>switchTile('street'));
document.getElementById('btn-sat').addEventListener('click',()=>switchTile('sat'));
let markers=[];
let activeFilters=new Set(Object.keys(LAYERS).filter(k=>LAYERS[k].visible));
function createIcon(color){
return L.divIcon({className:'',html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,.6);box-shadow:0 0 6px ${color}80"></div>`,iconSize:[12,12],iconAnchor:[6,6]});}
function getNavLink(lat,lng,mode){
return`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=${mode}`;}
function renderMarkers(){
markers.forEach(m=>map.removeLayer(m.marker));
markers=[];
const q=document.getElementById('search').value.toLowerCase();
const sysFilter=document.getElementById('system-filter').value;
let visible=LOCATIONS.filter(loc=>{
if(!activeFilters.has(loc.layer))return false;
if(sysFilter&&(loc.system||'')!==sysFilter)return false;
if(q&&!loc.name.toLowerCase().includes(q)&&!loc.city.toLowerCase().includes(q)&&!(loc.detail||'').toLowerCase().includes(q)&&!(loc.tags||[]).join(' ').toLowerCase().includes(q)&&!(loc.system||'').toLowerCase().includes(q))return false;
return true;
});
visible.forEach(loc=>{
const color=LAYERS[loc.layer]?.color||'#fff';
const marker=L.marker([loc.lat,loc.lng],{icon:createIcon(color)}).addTo(map);
const tagsHtml=(loc.tags||[]).map(t=>`<span class="p-tag">${t}</span>`).join('');
const navDrive=getNavLink(loc.lat,loc.lng,'driving');
const navTransit=getNavLink(loc.lat,loc.lng,'transit');
const navWalk=getNavLink(loc.lat,loc.lng,'walking');
marker.bindPopup(`<div class="popup-content"><h3>${loc.name}</h3><div class="p-type">${loc.layer} • ${loc.city}${loc.system?' • '+loc.system:''}</div>${loc.phone?`<div class="p-phone">📞 ${loc.phone}</div>`:''}${loc.crisis?`<div class="p-phone">🚨 Crisis: ${loc.crisis}</div>`:''}${loc.contacts?`<div class="p-detail">👤 ${loc.contacts}</div>`:''}  <div class="p-detail">${loc.detail||''}</div><div class="p-tags">${tagsHtml}</div><div class="nav-links"><a href="${navDrive}" target="_blank" class="nav-link nav-drive">🚗 Drive</a><a href="${navTransit}" target="_blank" class="nav-link nav-transit">🚌 Transit</a><a href="${navWalk}" target="_blank" class="nav-link nav-walk">🚶 Walk</a></div>${loc.alert?`<div class="p-alert p-alert-${loc.alertSeverity||'blue'}" style="margin-top:4px;padding:4px 8px;border-radius:4px;font-size:11px;${loc.alertSeverity==='yellow'?'background:#fef3c7;color:#92400e':loc.alertSeverity==='red'?'background:#fee2e2;color:#991b1b':'background:#dbeafe;color:#1e40af'}">${loc.alert}</div>`:''}${loc.distMi>1?`<div style="font-size:11px;color:#6b7280;margin-top:4px">🚗 ${formatDrive(loc)} from BPT Hospital</div>`:''}${loc.web?`<a href="https://${loc.web}" target="_blank" class="p-nav" style="margin-top:4px;display:inline-block">🌐 Website</a>`:''}</div>`);
markers.push({marker,loc});
});
document.getElementById('result-count').textContent=`${visible.length} resources shown`;
renderResults(visible);
renderStats(visible);
}
function renderResults(visible){
const el=document.getElementById('results');
el.innerHTML=visible.map(loc=>{
const color=LAYERS[loc.layer]?.color||'#fff';
const icon=LAYERS[loc.layer]?.icon||'📍';
const tagsHtml=(loc.tags||[]).map(t=>{
let cls='tag';
if(t==='IP')cls+=' tag-ip';else if(t==='PHP')cls+=' tag-php';else if(t==='IOP')cls+=' tag-iop';
else if(t==='Crisis'||t==='EmPATH')cls+=' tag-crisis';else if(t.includes('SUD')||t==='MAT'||t==='Detox')cls+=' tag-sud';
else if(t==='Shelter')cls+=' tag-shelter';else if(t==='Food')cls+=' tag-food';
else if(t==='Gym'||t==='Pool'||t==='Community Rec')cls+=' tag-gym';
else if(t==='Yoga'||t==='Meditation'||t==='MBSR'||t==='Zen')cls+=' tag-yoga';
else if(t==='Medical'||t==='Recreational')cls+=' tag-cannabis';
else if(t==='FQHC'||t==='Sleep'||t==='Pain'||t==='Neuropsych')cls+=' tag-bio';
else cls+=' tag-recovery';
return`<span class="${cls}">${t}</span>`;}).join('');
const nd=getNavLink(loc.lat,loc.lng,'driving'),nt=getNavLink(loc.lat,loc.lng,'transit'),nw=getNavLink(loc.lat,loc.lng,'walking');
return`<div class="result-card" data-lat="${loc.lat}" data-lng="${loc.lng}"><div class="result-name">${icon} ${loc.name}</div><div class="result-type" style="color:${color}">${loc.layer} • ${loc.city}${loc.system?' • '+loc.system:''}</div>${loc.phone?`<div class="result-phone">📞 ${loc.phone}${loc.crisis?' | 🚨 '+loc.crisis:''}</div>`:''}${loc.contacts?`<div class="result-detail">👤 ${loc.contacts}</div>`:''}  <div class="result-detail">${(loc.detail||'').substring(0,120)}${(loc.detail||'').length>120?'...':''}</div><div class="result-tags">${tagsHtml}</div>${loc.alert?`<div class="result-alert alert-bg-${loc.alertSeverity||'blue'}">${loc.alert}</div>`:''}${loc.distMi>1?`<div class="result-drive">🚗 ${formatDrive(loc)} from BPT</div>`:''}  <div class="nav-links"><a href="${nd}" target="_blank" class="nav-link nav-drive">🚗</a><a href="${nt}" target="_blank" class="nav-link nav-transit">🚌</a><a href="${nw}" target="_blank" class="nav-link nav-walk">🚶</a>${loc.web?`<a href="https://${loc.web}" target="_blank" class="nav-link" style="background:#6366f1">🌐</a>`:''}</div></div>`;}).join('');
el.querySelectorAll('.result-card').forEach(card=>{
card.addEventListener('click',e=>{
if(e.target.tagName==='A')return;
const lat=parseFloat(card.dataset.lat),lng=parseFloat(card.dataset.lng);
map.setView([lat,lng],14);
const m=markers.find(m=>m.loc.lat===lat&&m.loc.lng===lng);
if(m)m.marker.openPopup();
});});
}
function renderStats(visible){
const cats={};
visible.forEach(l=>{if(!cats[l.layer])cats[l.layer]=0;cats[l.layer]++;});
const el=document.getElementById('stats');
el.innerHTML=`<div class="stat"><div class="stat-num">${visible.length}</div><div class="stat-label">Total</div></div>`+
Object.entries(cats).slice(0,5).map(([k,v])=>`<div class="stat"><div class="stat-num" style="color:${LAYERS[k]?.color||'#fff'}">${v}</div><div class="stat-label">${k.split('(')[0].trim().substring(0,12)}</div></div>`).join('')+
`<div style="font-size:9px;color:#475569;margin-left:auto">Updated: Mar 2026</div>`;
}
function renderLayers(){
const el=document.getElementById('layers');
const allOn=activeFilters.size===Object.keys(LAYERS).length;
el.innerHTML=`<h3>Layers <span id="toggle-all" style="cursor:pointer;color:#0ea5e9;font-size:10px;text-transform:none;letter-spacing:0">${allOn?'Hide All':'Show All'}</span></h3>`;
document.getElementById('toggle-all').addEventListener('click',()=>{
    if(activeFilters.size===Object.keys(LAYERS).length)activeFilters.clear();
    else Object.keys(LAYERS).forEach(k=>activeFilters.add(k));
    renderLayers();renderMarkers();
});
Object.entries(LAYERS).forEach(([name,cfg])=>{
const active=activeFilters.has(name);
const div=document.createElement('div');
div.className='layer-item';
const cnt=LOCATIONS.filter(l=>l.layer===name).length;
div.innerHTML=`<div class="layer-check ${active?'active':''}" data-layer="${name}">${active?'✓':''}</div><div class="layer-dot" style="background:${cfg.color}"></div><span>${cfg.icon} ${name} (${cnt})</span>`;
div.querySelector('.layer-check').addEventListener('click',function(){
if(activeFilters.has(name))activeFilters.delete(name);else activeFilters.add(name);
renderLayers();renderMarkers();
});
el.appendChild(div);
});
}
document.getElementById('search').addEventListener('input',renderMarkers);
document.getElementById('system-filter').addEventListener('change',renderMarkers);
renderLayers();
renderMarkers();
</script>

<script src="../site.js"></script>
</body>
</html>
